name: Test Governance Check

on:
  push:
    branches: [main]

jobs:
  test-approval-required:
    name: "Test: production deploy (should require APPROVAL)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SidClaw Governance Check - Production
        id: governance
        uses: sidclawhq/governance-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          api-key: ${{ secrets.SIDCLAW_API_KEY }}
          agent-id: '9911d784-17ce-4466-9504-400dc1e2df78'
          operation: 'deploy'
          target-integration: 'production'
          data-classification: 'confidential'
          wait-for-approval: 'false'
          timeout: '30'
      - name: Check outputs
        if: always()
        run: |
          echo "Decision: ${{ steps.governance.outputs.decision }}"
          echo "Trace ID: ${{ steps.governance.outputs.trace-id }}"
          echo "Approval ID: ${{ steps.governance.outputs.approval-id }}"
